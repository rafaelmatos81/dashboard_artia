<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Artia — Exxata</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background-color: #09182b;
    }

    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }

    /* ── HEADER (compact) ───────────────────────── */
    .header {
      background-color: #09182b;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 42px;
      flex-shrink: 0;
      border-bottom: 2px solid #d51d07;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-divider {
      width: 1px;
      height: 20px;
      background-color: rgba(255,255,255,0.18);
    }

    .header-title {
      color: rgba(255,255,255,0.45);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .header-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(213,29,7,0.8);
      border: 1px solid rgba(213,29,7,0.3);
      padding: 2px 8px;
      border-radius: 3px;
    }

    /* ── IFRAME ─────────────────────────────────── */
    .embed-wrapper {
      flex: 1;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── FOOTER (minimal) ───────────────────────── */
    .footer {
      background-color: #09182b;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .footer-text {
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.04em;
    }

    .footer-text span {
      color: rgba(213,29,7,0.6);
      font-weight: 600;
    }
  </style>
</head>
