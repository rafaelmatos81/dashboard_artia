<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Artia — Exxata</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background-color: #09182b;
    }

    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }

    /* ── HEADER ─────────────────────────────────── */
    .header {
      background-color: #09182b;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 42px;
      flex-shrink: 0;
      border-bottom: 2px solid #d51d07;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-divider {
      width: 1px;
      height: 20px;
      background-color: rgba(255,255,255,0.18);
    }

    .header-title {
      color: rgba(255,255,255,0.45);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .header-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(213,29,7,0.85);
      border: 1px solid rgba(213,29,7,0.3);
      padding: 2px 8px;
      border-radius: 3px;
    }

    /* ── MAIN CONTENT ───────────────────────────── */
    .content {
      flex: 1;
      display: flex;
      overflow: hidden;
      gap: 6px;
      padding: 6px;
    }

    /* ── BI PANEL ───────────────────────────────── */
    .bi-wrapper {
      flex: 1;
      overflow: hidden;
      border-radius: 6px;
      border-top: 2px solid #d51d07;
      background: #fff;
    }

    .bi-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── SOCIAL COLUMN ──────────────────────────── */
    .social-column {
      width: 350px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .social-panel {
      flex: 1;
      background-color: #0d2240;
      border-radius: 6px;
      border-top: 2px solid #d51d07;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .social-panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }

    .social-panel-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .social-panel-icon.linkedin { background-color: #0a66c2; }
    .social-panel-icon.instagram {
      background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
    }

    .social-panel-icon svg { width: 16px; height: 16px; }

    .social-panel-title {
      color: rgba(255,255,255,0.85);
      font-size: 12px;
      font-weight: 600;
    }

    .social-panel-subtitle {
      color: rgba(255,255,255,0.35);
      font-size: 10px;
      margin-top: 1px;
    }

    .social-panel-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
    }

    /* embed placeholder — shown until a real widget is configured */
    .social-placeholder {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 12px;
      text-align: center;
    }

    .social-placeholder-icon {
      opacity: 0.15;
    }

    .social-placeholder-icon svg { width: 48px; height: 48px; }

    .social-placeholder-text {
      color: rgba(255,255,255,0.45);
      font-size: 11px;
      line-height: 1.6;
    }

    .social-placeholder-text strong {
      display: block;
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background-color: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.65);
      font-size: 11px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 4px;
      text-decoration: none;
      transition: background 0.2s;
    }

    .social-link:hover {
      background-color: rgba(255,255,255,0.12);
      color: #fff;
    }

    .social-link svg { width: 12px; height: 12px; }

    /* when a real embed widget is active, replace .social-placeholder with this */
    .social-embed {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ── FOOTER ──────────────────────────────────── */
    .footer {
      background-color: #09182b;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .footer-text {
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.04em;
    }

    .footer-text span { color: rgba(213,29,7,0.6); font-weight: 600; }
  </style>
</head>
